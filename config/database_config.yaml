# config/database_config.yaml
database:
  path: "data/dc_efds.db"
  schema_file: "database/schema.sql"
  backup_enabled: true
  backup_interval_hours: 24
  backup_dir: "data/backups"

connection:
  timeout_seconds: 30
  cache_size_mb: 64
  journal_mode: "WAL"
  synchronous: "NORMAL"

quality:
  auto_flag_corrupted: true
  auto_flag_duplicates: true
  min_image_dimensions: [50, 50]
  max_file_size_mb: 50

logging:
  level: "INFO"
  file: "logs/database.log"
  save_queries: false